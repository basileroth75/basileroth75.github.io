    const groupMapping = {
        "LVEC": "Bloc de gauche", "LREG": "Bloc de gauche", "LFI": "Bloc de gauche", "LSOC": "Bloc de gauche", "LECO": "Bloc de gauche", "LUG": "Bloc de gauche", "LCOM": "Bloc de gauche","LDVG": "Bloc de gauche",

        "LUXD": "Extrême-droite", "LEXD": "Extrême-droite", "LRN": "Extrême-droite", "LDSV": "Extrême-droite",  "LREC": "Extrême-droite"
    };

    const groupedColors = { "Bloc de gauche": "#C97A7A", "Bloc central": "#6B99A1", "Extrême-droite": "#2B3E50" };
    const globalColorMapping = { "LDIV": "#999999", "Liste d'extrême-gauche": "#8B3E3E" };

    const subPartiesByGroup = {};
    Object.keys(groupMapping).forEach(code => {
        const groupName = groupMapping[code];
        if (!subPartiesByGroup[groupName]) {
            subPartiesByGroup[groupName] = new Set();
        }
        const partyInfo = heatmapDataRaw.find(d => d.Code === code);
        if (partyInfo) {
            subPartiesByGroup[groupName].add(partyInfo.Party_Name);
        }
    });

    const totalListsPerGroup = {};
    heatmapDataRaw.forEach(d => {
        const groupName = groupMapping[d.Code] || d.Party_Name;
        if (!totalListsPerGroup[groupName]) totalListsPerGroup[groupName] = 0;
        totalListsPerGroup[groupName] += d.Total;
    });

    const aggregated = {};
    const listThreshold = 50; 

    heatmapDataRaw.forEach(d => {
        let groupName = groupMapping[d.Code] || d.Party_Name;
        if (!groupName || d.Total === 0 || (totalListsPerGroup[groupName] || 0) < listThreshold) return;

        let citySize = d.City_Size === "Plus de 100 000 hbts." ? "> 100 000" : d.City_Size;
        let key = groupName + "|" + citySize;

        if (!aggregated[key]) {
            aggregated[key] = { Party_Name: groupName, City_Size: citySize, Total: 0, Females: 0, OriginalCode: d.Code };
        }
        aggregated[key].Total += d.Total;
        aggregated[key].Females += d.Females;
    });

    const processedData = Object.values(aggregated).map(d => {
        d.Female_Pct = d.Total > 0 ? d.Females / d.Total : 0;
        d.Color = groupedColors[d.Party_Name] || globalColorMapping[d.Party_Name] || "#8C8C8C";
        return d;
    });

    const citySizeOrder = ["1 000 à 10 000 hbts.", "10 000 à 50 000 hbts.", "50 000 à 100 000 hbts.", "> 100 000"];
    const dataByGroup = d3.group(processedData, d => d.Party_Name);

    const container = d3.select("#linechart-container-grouped");
    const margin = {top: 20, right: 120, bottom: 80, left: 60}; 
    const containerWidth = container.node().clientWidth || 600;
    const svgWidth = Math.max(containerWidth, 550);
    const width = svgWidth - margin.left - margin.right;
    const height = 350;

    const svg = container.append("svg").attr("width", svgWidth).attr("height", height + margin.top + margin.bottom)
        .append("g").attr("transform", `translate(${margin.left},${margin.top})`);

    const tooltip = d3.select("body").append("div").attr("class", "d3-tooltip-fig2ter");

    const x = d3.scalePoint().domain(citySizeOrder).range([0, width]).padding(0.5);
    const y = d3.scaleLinear().domain([0.07, 0.55]).range([height, 0]).nice();

    svg.append("g").attr("transform", `translate(0,${height})`).call(d3.axisBottom(x));
    svg.append("text").attr("text-anchor", "middle").attr("x", width / 2).attr("y", height + 45).style("font-size", "11px").style("fill", "#555").style("font-style", "italic").text("Taille de la commune (nombre d'habitants)");
    svg.append("g").attr("class", "y-axis").call(d3.axisLeft(y).tickFormat(d3.format(".0%")));
    svg.append("text").attr("transform", "rotate(-90)").attr("y", 0 - margin.left).attr("x", 0 - (height / 2)).attr("dy", "1em").style("text-anchor", "middle").style("font-size", "11px").style("fill", "#555").style("font-style", "italic").text("% de femmes têtes de liste");

    const nationalAverage = 0.244;
    svg.append("line").attr("x1", 0).attr("x2", width).attr("y1", y(nationalAverage)).attr("y2", y(nationalAverage)).attr("stroke", "#d1d5db").attr("stroke-width", 1).attr("stroke-dasharray", "2,2");
    svg.append("text").attr("x", width).attr("y", y(nationalAverage) - 4).attr("text-anchor", "end").style("font-size", "9px").style("fill", "#9ca3af").text("Moy. nationale (24.4%)");

    const line = d3.line().x(d => x(d.City_Size)).y(d => y(d.Female_Pct));

    const groups = svg.selectAll(".line-group").data(dataByGroup).join("g").attr("class", "line-group");
    groups.append("path").attr("fill", "none").attr("stroke", d => d[1][0] ? d[1][0].Color : "#ccc").attr("stroke-width", 2.5).attr("d", d => line(d[1].sort((a, b) => citySizeOrder.indexOf(a.City_Size) - citySizeOrder.indexOf(b.City_Size))));

    groups.selectAll("circle").data(d => d[1]).join("circle").attr("cx", d => x(d.City_Size)).attr("cy", d => y(d.Female_Pct)).attr("r", 4).attr("fill", d => d.Color).style("cursor", "pointer")
        .on("mouseover", (event, d) => {
            const subParties = subPartiesByGroup[d.Party_Name] ? Array.from(subPartiesByGroup[d.Party_Name]) : [];
            const subPartiesHTML = subParties.length > 0 
                ? `<div style="margin-top:6px; padding-top:4px; font-size:10px; color:#777; font-style: italic; line-height: 1.3;"><b>Inclut :</b><br>• ${subParties.join('<br>• ')}</div>` 
                : '';

            tooltip.style("opacity", 1).html(`
                <div class="tooltip-title" style="color: ${d.Color};">${d.Party_Name}</div>
                <div>Strate: <b>${d.City_Size}</b></div>
                <div>Femmes têtes de liste: <b>${d3.format(".1%")(d.Female_Pct)}</b></div>
                <div style="margin-top:6px; font-size:11px; border-top: 1px solid #eee; padding-top:4px;">Total listes: ${d.Total}</div>
                ${subPartiesHTML}
            `).style("left", (event.pageX + 15) + "px").style("top", (event.pageY - 28) + "px");
        }).on("mouseout", () => tooltip.style("opacity", 0));

    groups.append("text").datum(d => {
        const lastPoint = d[1].reduce((a, b) => citySizeOrder.indexOf(a.City_Size) > citySizeOrder.indexOf(b.City_Size) ? a : b);
        return { name: d[0], lastPoint: lastPoint };
    }).attr("transform", d => `translate(${x(d.lastPoint.City_Size)}, ${y(d.lastPoint.Female_Pct)})`).attr("x", 8).attr("dy", "0.35em").style("font-size", "11px").style("font-weight", "bold").style("fill", d => d.lastPoint.Color).text(d => d.name);
})();
